version: '3.8'

services:
  # 🗄️ Database Service
  db:
    image: postgres:17-alpine
    container_name: salama_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}       
      POSTGRES_USER: ${DB_USER}       
      POSTGRES_PASSWORD: ${DB_PASSWORD} 
    volumes:
      - salama_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # ⚡ Redis Service
  redis:
    image: redis:7-alpine
    container_name: salama_redis
    restart: always
    ports:
      - "6379:6379"

  # 🐍 Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salama_backend
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env  # Docker will automatically load variables from here
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis

  # ⚛️ React Vite Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: salama_frontend
    restart: always
    ports:
      - "80:80"  # Serves the app and proxies /api to backend on port 80
    depends_on:
      - backend

volumes:
  salama_postgres_data:
    driver: local